service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    note: Đảm bảo độ trễ đuôi (tail latency) không làm ảnh hưởng đến trải nghiệm người dùng cuối.
  latency_p99_ms:
    objective: 10000
    target: 99.9
    note: Giới hạn độ trễ tối đa cho các yêu cầu phức tạp nhất, tránh treo hệ thống.
  error_rate_pct:
    objective: 2
    target: 99.0
    note: Duy trì tỷ lệ lỗi thấp để đảm bảo tính tin cậy của dịch vụ.
  daily_cost_usd:
    objective: 2.5
    target: 100.0
    note: Kiểm soát chi phí vận hành hàng ngày trong hạn mức ngân sách.
  quality_score_avg:
    objective: 0.75
    target: 95.0
    note: Đảm bảo độ chính xác và tính hữu ích của các câu trả lời từ AI Agent.
