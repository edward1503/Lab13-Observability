alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 5000 for 30m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 2x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
  - name: low_quality_score
    severity: P2
    condition: quality_score_avg < 0.6 for 10m
    type: quality-based
    owner: ai-quality-team
    runbook: docs/alerts.md#4-low-quality-score
  - name: extreme_latency_p99
    severity: P1
    condition: latency_p99 > 10000 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#5-extreme-latency-p99
  - name: token_consumption_warning
    severity: P2
    condition: tokens_out_total > 1000000
    type: resource-based
    owner: finops-owner
    runbook: docs/alerts.md#6-token-consumption-warning
  - name: high_runtime_error_rate
    severity: P1
    condition: error_breakdown['RuntimeError'] > 10 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#7-high-runtime-error-rate
